<div class="flex flex-col gap-6 p-4 sm:p-6 rounded-lg border border-olive-border bg-olive-parchment max-w-2xl mx-auto">
  <div>
    <h2 class="text-2xl font-bold tracking-tight text-[#23251d] font-display">QR Generator</h2>
    <p class="mt-1 text-sm text-[#4d4f46]">Generate QR codes from text and URLs.</p>
  </div>

  <div class="flex flex-wrap items-end gap-4 p-4 border border-olive-border rounded-lg bg-[#eeefe9]">
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-[#23251d]">
      Size
      <select [value]="size()" (change)="onSizeChange($any($event.target).value)" class="w-full px-4 py-2.5 bg-white border border-[#b6b7af] rounded-md text-[#23251d] focus:outline-none focus:ring-2 focus:ring-blue-500/50">
        <option value="small">Small (128px)</option>
        <option value="medium">Medium (256px)</option>
        <option value="large">Large (512px)</option>
      </select>
    </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-[#23251d]">
      Color
      <input type="color" [value]="fgColor()" (input)="onColorChange($any($event.target).value)" class="w-12 h-10 bg-transparent border-0 cursor-pointer rounded" />
    </label>
  </div>

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-[#23251d]">Content</label>
    <app-input-box [value]="inputText()" (valueChange)="onInputChange($event)" placeholder="Enter text or URL..." [multiline]="true" [rows]="4" inputClass="w-full px-4 py-3 bg-[#eeefe9] border border-[#b6b7af] rounded-md text-[#23251d] placeholder:text-[#9ea096] focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"></app-input-box>
  </div>

  @if (error()) { 
    <p class="flex items-center gap-2 text-sm font-semibold text-red-600">
      <fa-icon [icon]="['fas', 'circle-exclamation']"></fa-icon>
      {{ error() }}
    </p> 
  }

  @if (qrDataUrl()) {
    <div class="flex flex-col items-center gap-4 p-4 border border-olive-border rounded-lg bg-[#eeefe9]">
      <img [src]="qrDataUrl()" alt="QR Code" class="border border-[#bfc1b7] rounded-lg" />
      <button (click)="download()" class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-base font-semibold text-white transition-all duration-150 rounded-md bg-[#1e1f23] hover:opacity-70 active:opacity-80">
        <fa-icon [icon]="['fas', 'download']"></fa-icon>
        Download PNG
      </button>
    </div>
  }
</div>
