<footer class="py-6 border-t bg-parchment border-olive-border">
  <div class="flex flex-col items-center justify-center gap-4">
    <div class="flex items-center gap-2">
      <img src="logo.png" alt="logo" class="w-auto h-10" />
    </div>
    <p class="text-sm text-olive-ink/70">{{ t().freeOnlineTools }}</p>
    <div class="text-xs text-olive-ink/60 text-center">
      <span class="font-semibold">More Pockly tools:</span>
      <a
        href="https://pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >Home</a
      >
      <a
        href="https://text.pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >Text</a
      >
      <a
        href="https://json.pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >JSON</a
      >
      <a
        href="https://image.pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >Image</a
      >
      <a
        href="https://url.pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >URL / QR</a
      >
      <a
        href="https://flow.pockly.uk"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-2 hover:text-olive-ink underline"
        >Flow</a
      >
    </div>
    <div class="text-xs text-olive-ink/60 text-center">
      <a href="https://pockly.uk/about" class="ml-2 hover:text-olive-ink underline">About</a>
      <a href="https://pockly.uk/contact" class="ml-2 hover:text-olive-ink underline">Contact</a>
      <a href="https://pockly.uk/privacy" class="ml-2 hover:text-olive-ink underline">Privacy Policy</a>
      <a href="https://pockly.uk/terms" class="ml-2 hover:text-olive-ink underline">Terms of Use</a>
    </div>
    <div class="flex items-center gap-2">
      <label for="language-select" class="text-xs text-olive-ink/60"
        >{{ t().languageLabel }}:</label
      >
      <select
        id="language-select"
        (change)="onLanguageChange($event)"
        [value]="language()"
        class="text-xs px-2 py-1 bg-olive-cream border border-olive-light rounded text-olive-ink focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer"
      >
        @for (lang of availableLanguages; track lang.code) {
          <option [value]="lang.code">{{ lang.nativeName }}</option>
        }
      </select>
    </div>
  </div>
</footer>
