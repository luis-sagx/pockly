<div class="flex flex-col gap-6 p-4 sm:p-6">
  <div>
    <h2 class="text-3xl font-display font-bold tracking-tight text-olive-deep">TSV → JSON</h2>
    <p class="mt-1 text-sm text-olive-muted">Paste TSV (tab-separated) data to convert it to JSON format.</p>
  </div>

  @if (error()) {
    <p class="flex items-center gap-2 text-sm text-red-600">
      <app-icon name="alert" class="w-4 h-4"></app-icon> {{ error() }}
    </p>
  }

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">TSV Input</label>
    <textarea
      [value]="input()"
      (input)="input.set($any($event.target).value)"
      placeholder="name&#9;age&#9;city&#10;John&#9;30&#9;NYC"
      rows="10"
      class="w-full p-3 text-sm text-olive-deep placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"
    ></textarea>
  </div>

  <div class="flex flex-wrap gap-2">
    <button (click)="convert()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-70 hover:text-posthog-amber">
      <app-icon name="shuffle" class="w-4 h-4"></app-icon> Convert
    </button>
    @if (output()) {
      <button (click)="download()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-green-600 rounded-lg hover:bg-green-700">
        <app-icon name="download" class="w-4 h-4"></app-icon> Download
      </button>
    }
    <button (click)="clear()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-olive-ink transition bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange">
      <app-icon name="trash" class="w-4 h-4"></app-icon> Clear
    </button>
  </div>

  @if (output()) {
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-olive-ink">JSON Output:</label>
      <app-output-box [text]="output()" />
    </div>
  }
</div>
