<div class="flex flex-col items-center justify-center min-h-[70vh] gap-8 px-4">
  <div class="text-center">
    <div class="flex items-center justify-center gap-3 mb-4">
      <app-icon name="link" class="w-12 h-12 text-posthog-orange"></app-icon>
    </div>
    <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-olive-deep font-display" style="line-height: 1.2; letter-spacing: -0.75px;">URL Tools</h1>
    <p class="mt-3 text-lg text-olive-ink font-body" style="line-height: 1.5;">Free online URL utilities — no signup, no ads.</p>
  </div>
  <div class="grid gap-4 w-full max-w-2xl sm:grid-cols-2">
    @for (tool of toolList; track tool.path) {
    <button (click)="navigate(tool.path)" class="flex flex-col items-start p-5 text-left transition border bg-olive-parchment border-olive-border rounded-lg hover:border-posthog-orange hover:bg-olive-cream">
      <div class="flex items-center gap-3 mb-2">
        <app-icon [name]="tool.icon" class="w-5 h-5 text-posthog-orange"></app-icon>
        <span class="text-lg font-bold text-olive-deep font-display" style="font-weight: 700;">{{ tool.label }}</span>
      </div>
      <p class="text-sm text-olive-ink font-body" style="line-height: 1.5;">{{ tool.description }}</p>
    </button>
    }
  </div>
</div>
