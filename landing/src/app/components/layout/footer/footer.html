<footer class="py-8 border-t bg-olive-lightSage text-surface border-zinc-800">
  <div class="container px-4 mx-auto">
    <div class="mb-8">
      <!-- Brand -->
      <div class="flex flex-col gap-3">
        <div class="flex items-center gap-2">
          <img src="logo.png" alt="logo" class="w-48 h-auto" />
        </div>
        <p class="max-w-2xl text-sm text-zinc-500">
          Fast launcher for the Pockly tool ecosystem. Open any category or page from one place.
        </p>
      </div>
    </div>

    <div class="grid gap-6 mb-6 lg:grid-cols-5 md:grid-cols-2">
      @for (category of categories; track category.key) {
        <div>
          <h4 class="mb-3 text-sm font-semibold text-tomato-500">
            {{ category.title }}
          </h4>
          <ul class="space-y-2 text-sm text-zinc-500">
            @for (link of category.links; track link.url) {
              <li>
                <a
                  [href]="link.url"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="transition hover:text-brand-400"
                  >{{ link.label }}</a
                >
              </li>
            }
          </ul>
        </div>
      }
    </div>

    <!-- Bottom bar -->
    <div
      class="flex flex-col items-center justify-between pt-4 border-t border-zinc-800 sm:flex-row"
    >
      <p class="text-sm text-zinc-600">© 2026 Pockly. All tools, one launcher.</p>
    </div>
  </div>
</footer>
