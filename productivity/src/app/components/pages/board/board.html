<div class="flex flex-col gap-6 p-4 sm:p-6">
  @if (syncError()) {
    <div class="px-4 py-2 text-sm font-medium text-amber-800 bg-amber-100 border border-amber-300 rounded-lg">
      {{ syncError() }}
    </div>
  }

  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">
        {{ t().board }}
      </h2>
      <p class="mt-1 text-sm text-olive-ink/70">{{ t().boardDesc }}</p>
    </div>
    <button
      (click)="showCreateForm.set(!showCreateForm())"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-olive-deep rounded-lg hover:opacity-80 transition"
    >
      <fa-icon [icon]="faPlus"></fa-icon> {{ t().createTask }}
    </button>
  </div>

  @if (showCreateForm()) {
    <app-create-task-form
      (created)="createTask($event); showCreateForm.set(false)"
      (cancelled)="showCreateForm.set(false)"
    />
  }

  <div class="columns-container" cdkDropListGroup>
    <app-task-column
      horizon="someday"
      [tasks]="somedayTasks()"
      (dropped)="onTaskDropped($event)"
      (reordered)="onColumnReordered($event, 'someday')"
      (taskClicked)="onTaskClicked($event)"
      (taskDeleted)="deleteTask($event)"
    />

    <app-task-column
      horizon="week"
      [tasks]="weekTasks()"
      (dropped)="onTaskDropped($event)"
      (reordered)="onColumnReordered($event, 'week')"
      (taskClicked)="onTaskClicked($event)"
      (taskDeleted)="deleteTask($event)"
    />

    <app-task-column
      horizon="today"
      [tasks]="todayTasks()"
      (dropped)="onTaskDropped($event)"
      (reordered)="onColumnReordered($event, 'today')"
      (taskClicked)="onTaskClicked($event)"
      (taskDeleted)="deleteTask($event)"
    />
  </div>


@if (showDetail() && activeTask()) {
    <app-task-detail
      [task]="activeTask()"
      [open]="showDetail()"
      (saved)="onTaskSaved($event)"
      (closed)="onDetailClosed()"
    />
  }
</div>
