<div class="flex flex-col min-h-screen bg-olive-parchment">
  <app-nav />
  <main class="flex-1 pt-16 sm:pt-20">
    <div class="page-shell">
      <div class="flex gap-8">
        <div class="flex-1 min-w-0">
          <router-outlet />
        </div>
        @if (showSidebar()) {
          <app-ad-sidebar
            [enabled]="adConfig.enabled"
            [adClient]="adConfig.adClient"
            [slot]="adConfig.slots.sidebar"
          />
        }
      </div>
    </div>
  </main>
  <app-footer />
</div>
