<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]"
>
  <div>
    <h2 class="text-3xl font-semibold tracking-tight text-brand-100">
      Unit Converter
    </h2>
    <p class="mt-1 text-sm text-zinc-500">Convert between units instantly.</p>
  </div>

  <!-- Category Tabs -->
  <div
    class="flex flex-wrap gap-2 p-1 bg-zinc-900/60 border border-zinc-800 rounded-xl"
  >
    @for (cat of categories; track cat.key) {
    <button
      (click)="setCategory($any(cat.key))"
      [class]="category() === cat.key ? 'px-4 py-2 text-sm font-medium bg-brand-600 text-white rounded-lg' : 'px-4 py-2 text-sm font-medium text-slate-300 hover:bg-zinc-800 rounded-lg'"
    >
      {{ cat.name }}
    </button>
    }
  </div>

  <!-- Converter Section -->
  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Left: Input -->
    <div
      class="flex-1 flex flex-col gap-4 p-4 bg-zinc-900/60 border border-zinc-800 rounded-xl"
    >
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-slate-300">From</span>
      </div>

      <select
        [ngModel]="fromUnit()"
        (ngModelChange)="onFromUnitChange($event)"
        class="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500"
      >
        @for (unit of unitOptions() | keyvalue; track unit.key) {
        <option [value]="unit.key">
          {{ unit.value.name }} ({{ unit.value.symbol }})
        </option>
        }
      </select>

      <label class="flex flex-col gap-1.5 text-sm font-semibold text-slate-300">
        Amount to convert
        <input
          type="number"
          step="any"
          [value]="amount()"
          (input)="onAmountChange(+$any($event.target).value)"
          class="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500"
        />
      </label>
    </div>

    <!-- Swap Button (center on desktop) -->
    <div class="flex lg:flex-col items-center justify-center gap-2">
      <button
        (click)="swap()"
        class="flex items-center justify-center w-10 h-10 transition border rounded-full border-zinc-700 text-zinc-400 hover:text-brand-400 hover:border-brand-500"
      >
        <app-icon name="shuffle" class="w-4 h-4"></app-icon>
      </button>
    </div>

    <!-- Right: Result -->
    <div
      class="flex-1 flex flex-col gap-4 p-4 bg-zinc-900/60 border border-zinc-800 rounded-xl"
    >
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-slate-300">To</span>
      </div>

      <select
        [ngModel]="toUnit()"
        (ngModelChange)="onToUnitChange($event)"
        class="w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500"
      >
        @for (unit of unitOptions() | keyvalue; track unit.key) {
        <option [value]="unit.key">
          {{ unit.value.name }} ({{ unit.value.symbol }})
        </option>
        }
      </select>

      <div class="flex flex-col gap-1.5">
        <span class="text-sm font-semibold text-slate-300">Result</span>
        <div class="p-3 bg-zinc-950 border border-zinc-700 rounded-lg">
          <span class="text-2xl font-bold text-brand-400 break-all">
            {{ result() | number:getDecimals() }} {{ toUnit() }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Decimal precision selector -->
  <div
    class="flex items-center gap-4 p-4 bg-zinc-900/60 border border-zinc-800 rounded-xl"
  >
    <span class="text-sm font-semibold text-slate-300">Decimal precision:</span>
    <div class="flex gap-2">
      @for (d of [0, 1, 2, 3, 4, 6]; track d) {
      <button
        (click)="onDecimalsChange(d)"
        [class]="decimals() === d ? 'px-3 py-1 text-sm font-medium bg-brand-600 text-white rounded-lg' : 'px-3 py-1 text-sm font-medium text-slate-300 bg-zinc-800 hover:bg-zinc-700 rounded-lg'"
      >
        {{ d }}
      </button>
      }
    </div>
  </div>
</div>
