<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-lg bg-olive-parchment shadow-lg"
>
  <div>
    <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">{{ t().wordCounter }}</h2>
    <p class="mt-1 text-sm text-olive-ink/70">{{ t().countWordsAndCharacters }}</p>
  </div>

  <!-- Upload File -->
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">{{ t().uploadFile }}</label>
    <input
      type="file"
      accept=".txt,.md,.text,.docx,.pdf"
      (change)="onFileSelected($event)"
      class="block w-full text-sm text-olive-ink file:mr-4 file:px-4 file:py-2 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-olive-deep file:text-white file:cursor-pointer file:transition file:hover:opacity-80 bg-olive-cream border border-olive-light rounded-lg cursor-pointer"
    />
    @if (fileName()) {
      <p class="text-sm text-olive-ink/70">{{ t().fileLoaded }}: {{ fileName() }}</p>
    }
    <p class="text-xs text-olive-ink/50">{{ t().supportedFormats }}</p>
  </div>

  <app-input-box
    [value]="inputText()"
    (valueChange)="inputText.set($event)"
    [rows]="5"
    [placeholder]="t().enterTextHere"
    inputClass="w-full p-4 text-olive-deep placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-light rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50"
  />
  <button
    (click)="clear()"
    class="self-start flex items-center gap-2 px-4 py-2 text-sm font-semibold text-olive-ink transition bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange"
  >
    <i class="fas fa-trash"></i> {{ t().clear }}
  </button>
  <div class="flex flex-col gap-2">
    <h3 class="text-sm font-bold text-olive-deep font-display">{{ t().results }}</h3>
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-semibold text-olive-ink/60">{{ t().wordCountLabel }}</span>
        <div
          class="p-3 font-mono text-lg text-olive-deep bg-olive-cream border border-olive-light rounded-lg"
        >
          {{ wordCount() }}
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-xs font-semibold text-olive-ink/60">{{ t().characterCount }}</span>
        <div
          class="p-3 font-mono text-lg text-olive-deep bg-olive-cream border border-olive-light rounded-lg"
        >
          {{ charCount() }}
        </div>
      </div>
    </div>
  </div>
</div>
