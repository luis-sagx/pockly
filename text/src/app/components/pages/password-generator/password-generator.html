<div class="flex flex-col gap-6 p-4 sm:p-6">
  <div>
    <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">
      {{ t().passwordGenerator }}
    </h2>
    <p class="mt-1 text-sm text-olive-ink/70">{{ t().generateSecurePasswords }}</p>
  </div>
  <div
    class="flex flex-wrap items-end gap-6 p-10 bg-olive-cream border border-olive-light rounded-lg"
  >
    <div class="flex flex-col gap-2 min-w-[200px]">
      <label class="font-semibold text-olive-deep mb-2 text-lg"
        >{{ t().length }} <span class="text-posthog-orange">{{ length() }}</span></label
      >
      <input
        type="range"
        min="8"
        max="64"
        [value]="length()"
        (input)="length.set(+$any($event.target).value)"
        class="w-96 h-2 bg-olive-placeholder rounded-lg appearance-none cursor-pointer accent-posthog-orange"
      />
      <div class="flex justify-between text-sm text-olive-ink"><span>8</span><span>64</span></div>
    </div>
    <div class="flex flex-col gap-3 ml-10">
      <label class="flex items-center gap-2 cursor-pointer text-olive-ink"
        ><input
          type="checkbox"
          [checked]="includeUppercase()"
          (change)="includeUppercase.set($any($event.target).checked)"
          class="w-4 h-4 accent-posthog-orange"
        />
        {{ t().uppercaseAZ }}</label
      >
      <label class="flex items-center gap-2 cursor-pointer text-olive-ink"
        ><input
          type="checkbox"
          [checked]="includeLowercase()"
          (change)="includeLowercase.set($any($event.target).checked)"
          class="w-4 h-4 accent-posthog-orange"
        />
        {{ t().lowerCaseAz }}</label
      >
      <label class="flex items-center gap-2 cursor-pointer text-olive-ink"
        ><input
          type="checkbox"
          [checked]="includeNumbers()"
          (change)="includeNumbers.set($any($event.target).checked)"
          class="w-4 h-4 accent-posthog-orange"
        />
        {{ t().numbers09 }}</label
      >
      <label class="flex items-center gap-2 cursor-pointer text-olive-ink"
        ><input
          type="checkbox"
          [checked]="includeSymbols()"
          (change)="includeSymbols.set($any($event.target).checked)"
          class="w-4 h-4 accent-posthog-orange"
        />
        {{ t().symbols }}</label
      >
    </div>
  </div>
  <button
    (click)="generate()"
    [disabled]="!canGenerate()"
    class="flex items-center gap-2 px-6 py-3 font-semibold text-white transition bg-olive-deep rounded-xl hover:opacity-80 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <fa-icon [icon]="faKey"></fa-icon> {{ t().generatePassword }}
  </button>
  @if (generatedPassword()) {
    <div class="flex flex-col gap-6 mt-6">
      <div class="flex items-center gap-2 justify-between">
        <h3 class="text-lg font-bold text-olive-deep font-display">{{ t().generatedPassword }}</h3>
        <app-copy-button [textToCopy]="generatedPassword()" />
      </div>
      <div class="flex items-center gap-3 p-4 bg-olive-cream border border-olive-light rounded-lg">
        <code class="flex-1 font-mono text-olive-deep break-all">{{ generatedPassword() }}</code>
      </div>
      <button
        (click)="regenerate()"
        class="text-sm flex items-center gap-2 px-4 py-2 font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-80 w-fit"
      >
        <fa-icon [icon]="faSync"></fa-icon> {{ t().regenerate }}
      </button>
    </div>  
  }
</div>
