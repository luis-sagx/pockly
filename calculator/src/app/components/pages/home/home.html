<div class="flex flex-col items-center justify-center min-h-[70vh] gap-10 p-6">
  <!-- Hero Section -->
  <div class="text-center max-w-2xl">
    <h1 class="text-[30px] font-extrabold tracking-tight text-olive-deep leading-[1.20] mb-4">
      Calculator Tools
    </h1>
    <p class="text-lg text-olive-ink leading-[1.50]">
      Free online calculators — no signup, no ads.
    </p>
  </div>

  <!-- Tool Cards Grid -->
  <div class="grid gap-4 w-full max-w-2xl sm:grid-cols-1">
    @for (tool of toolList; track tool.path) {
    <button (click)="navigate(tool.path)" class="tool-card group">
      <div class="flex items-center gap-3 mb-2">
        <app-icon [name]="tool.icon" class="w-5 h-5 text-olive-deep transition-colors group-hover:text-posthog-orange"></app-icon>
        <span class="tool-card-title">{{ tool.label }}</span>
      </div>
      <p class="tool-card-desc">{{ tool.description }}</p>
    </button>
    }
  </div>
</div>
