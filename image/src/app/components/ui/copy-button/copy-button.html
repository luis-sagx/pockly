<button (click)="copyText()" class="flex items-center gap-1 px-3 py-1 text-sm font-medium transition border rounded-lg text-tomato-300 bg-tomato-500/15 hover:bg-tomato-500/30 border-tomato-500/30">@if (!copied()) { <span><app-icon name="copy" class="w-4 h-4 text-tomato-400"></app-icon> Copy</span> } @else { <span><app-icon name="check" class="w-4 h-4 text-tomato-400"></app-icon> Copied</span> }</button>
