<div class="page-content">
  <!-- Header -->
  <div>
    <h2 class="page-title">Unit Converter</h2>
    <p class="mt-1 text-sm text-olive-ink/70">Convert between units instantly.</p>
  </div>

  <!-- Category Tabs -->
  <div class="flex flex-wrap gap-2 p-1 bg-olive-cream border border-olive-border rounded">
    @for (cat of categories; track cat.key) {
    <button
      (click)="setCategory($any(cat.key))"
      [class]="category() === cat.key ? 'tab-btn-active' : 'tab-btn'"
    >
      {{ cat.name }}
    </button>
    }
  </div>

  <!-- Converter Section -->
  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Left: Input -->
    <div class="flex-1 flex flex-col gap-4 p-4 bg-olive-cream border border-olive-border rounded">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-olive-deep">From</span>
      </div>

      <select
        [ngModel]="fromUnit()"
        (ngModelChange)="onFromUnitChange($event)"
        class="select-field"
      >
        @for (unit of unitOptions() | keyvalue; track unit.key) {
        <option [value]="unit.key">
          {{ unit.value.name }} ({{ unit.value.symbol }})
        </option>
        }
      </select>

      <label class="flex flex-col gap-1.5 text-sm font-semibold text-olive-deep">
        Amount to convert
        <input
          type="number"
          step="any"
          [value]="amount()"
          (input)="onAmountChange(+$any($event.target).value)"
          class="input-field"
        />
      </label>
    </div>

    <!-- Swap Button (center on desktop) -->
    <div class="flex lg:flex-col items-center justify-center gap-2">
      <button
        (click)="swap()"
        class="flex items-center justify-center w-10 h-10 transition border-2 border-olive-border rounded-full text-olive-ink hover:text-posthog-orange hover:border-posthog-orange"
      >
        <app-icon name="shuffle" class="w-4 h-4"></app-icon>
      </button>
    </div>

    <!-- Right: Result -->
    <div class="flex-1 flex flex-col gap-4 p-4 bg-olive-cream border border-olive-border rounded">
      <div class="flex items-center gap-2">
        <span class="text-sm font-semibold text-olive-deep">To</span>
      </div>

      <select
        [ngModel]="toUnit()"
        (ngModelChange)="onToUnitChange($event)"
        class="select-field"
      >
        @for (unit of unitOptions() | keyvalue; track unit.key) {
        <option [value]="unit.key">
          {{ unit.value.name }} ({{ unit.value.symbol }})
        </option>
        }
      </select>

      <div class="flex flex-col gap-1.5">
        <span class="text-sm font-semibold text-olive-deep">Result</span>
        <div class="result-display">
          <span class="result-text">
            {{ result() | number:getDecimals() }} {{ toUnit() }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Decimal precision selector -->
  <div class="flex items-center gap-4 p-4 bg-olive-cream border border-olive-border rounded">
    <span class="text-sm font-semibold text-olive-deep">Decimal precision:</span>
    <div class="flex gap-2">
      @for (d of [0, 1, 2, 3, 4, 6]; track d) {
      <button
        (click)="onDecimalsChange(d)"
        [class]="decimals() === d ? 'tab-btn-active' : 'tab-btn'"
      >
        {{ d }}
      </button>
      }
    </div>
  </div>
</div>
