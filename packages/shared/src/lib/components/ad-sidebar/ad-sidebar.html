@if (enabled && adClient && slot) {
  <aside class="hidden w-[300px] flex-shrink-0 lg:block">
    <div class="sticky top-24">
      <ins
        class="adsbygoogle block overflow-hidden rounded-lg"
        [style.display]="'block'"
        [style.width.px]="width"
        [style.height.px]="height"
        [attr.data-ad-client]="adClient"
        [attr.data-ad-slot]="slot"
      ></ins>
    </div>
  </aside>
}
