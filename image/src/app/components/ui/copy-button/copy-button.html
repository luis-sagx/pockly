<button (click)="copyText()" class="flex items-center gap-1 px-3 py-1 text-sm font-medium transition border rounded-lg text-tomato-300 bg-tomato-500/15 hover:bg-tomato-500/30 border-tomato-500/30">@if (!copied()) { <span><fa-icon [icon]="['fas', 'copy']" class="w-4 h-4 text-tomato-400"></fa-icon> Copy</span> } @else { <span><fa-icon [icon]="['fas', 'check']" class="w-4 h-4 text-tomato-400"></fa-icon> Copied</span> }</button>
