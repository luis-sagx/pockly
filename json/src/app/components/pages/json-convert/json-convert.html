<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-2xl bg-olive-parchment text-olive-ink shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]"
>
  <div>
    <h2 class="text-3xl font-display font-bold tracking-tight text-olive-deep">JSON Convert</h2>
    <p class="mt-1 text-sm text-olive-muted">Convert between JSON, CSV, TSV, XML, and YAML formats.</p>
  </div>

  <div class="flex flex-wrap gap-2">
    @for (mode of modes; track mode.value) {
    <button (click)="setMode(mode.value)" [class]="activeMode() === mode.value ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber' : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'">
      <i [class]="'fas ' + mode.icon"></i> {{ mode.label }}
    </button>
    }
  </div>

  @if (error()) {
  <p class="flex items-center gap-2 text-sm text-red-600"><app-icon name="alert" class="w-4 h-4"></app-icon> {{ error() }}</p>
  }

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">
      @if (activeMode().startsWith('json')) { JSON Input } @else { {{ activeMode().replace('2json', '').toUpperCase() }} Input }
    </label>
    <textarea
      [value]="input()"
      (input)="input.set($any($event.target).value)"
      placeholder="Paste your data here..."
      rows="6"
      class="w-full p-3 text-sm text-olive-deep placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"
    ></textarea>
  </div>

  <div class="flex flex-wrap gap-2">
    <button (click)="convert()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-70 hover:text-posthog-amber">
      <app-icon name="shuffle" class="w-4 h-4"></app-icon> Convert
    </button>
    @if (output()) {
    <button (click)="download()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-green-600 rounded-lg hover:bg-green-700">
      <app-icon name="download" class="w-4 h-4"></app-icon> Download
    </button>
    }
  </div>

  @if (output()) {
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">Output:</label>
    <app-output-box [text]="output()" />
  </div>
  }
</div>
