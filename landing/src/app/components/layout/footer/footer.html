<footer class="py-8 border-t bg-olive-lightSage text-surface border-zinc-800">
  <div class="container px-4 mx-auto">
    <div class="mb-8">
      <!-- Brand -->
      <div class="flex flex-col gap-3">
        <div class="flex items-center gap-2">
          <img src="logo.png" alt="logo" class="w-48 h-auto" />
        </div>
        <p class="max-w-2xl text-sm text-zinc-500">{{ t().freeOnlineTools }}</p>
      </div>
    </div>

    <div class="grid gap-6 mb-6 lg:grid-cols-5 md:grid-cols-2">
      @for (category of translatedCategories(); track category.key) {
      <div>
        <h4 class="mb-3 text-sm font-semibold text-tomato-500">
          {{ category.title }}
        </h4>
        <ul class="space-y-2 text-sm text-zinc-500">
          @for (link of category.links; track link.url) {
          <li>
            <a
              [href]="link.url"
              target="_blank"
              rel="noopener noreferrer"
              class="transition hover:text-brand-400"
              >{{ link.label }}</a
            >
          </li>
          }
        </ul>
      </div>
      }
    </div>

    <!-- Legal links -->
    <div class="flex flex-wrap items-center gap-4 mb-4 text-sm text-zinc-500">
      <a href="/about" class="transition hover:text-brand-400">About</a>
      <a href="/contact" class="transition hover:text-brand-400">Contact</a>
      <a href="/privacy" class="transition hover:text-brand-400">Privacy Policy</a>
      <a href="/terms" class="transition hover:text-brand-400">Terms of Use</a>
    </div>

    <!-- Bottom bar -->
    <div
      class="flex flex-col items-center justify-between pt-4 border-t border-zinc-800 gap-3 sm:flex-row"
    >
      <p class="text-sm text-zinc-600">{{ t().footerCopyright }}</p>

      <div class="flex items-center gap-2">
        <label for="language-select" class="text-xs text-zinc-500"
          >{{ t().languageLabel }}:</label
        >
        <select
          id="language-select"
          (change)="onLanguageChange($event)"
          [value]="language()"
          class="text-xs px-2 py-1 bg-surface border border-zinc-700 rounded text-zinc-700 focus:outline-none focus:ring-2 focus:ring-blue-500/50 cursor-pointer"
        >
          @for (lang of availableLanguages; track lang.code) {
          <option [value]="lang.code">{{ lang.nativeName }}</option>
          }
        </select>
      </div>
    </div>
  </div>
</footer>
