<section class="flex flex-col max-w-4xl gap-10 px-4 pt-10 mx-auto mt-20 border-t sm:mt-28 sm:px-6 border-olive-border">
  <div>
    <h2 class="text-2xl font-bold text-olive-deep font-display">{{ content.aboutTitle }}</h2>
    @for (paragraph of content.about; track $index) {
      <p class="mt-4 text-base leading-relaxed text-olive-ink/80 font-body">{{ paragraph }}</p>
    }
  </div>

  <div>
    <h2 class="text-2xl font-bold text-olive-deep font-display">{{ content.howTitle }}</h2>
    <ol class="mt-4 space-y-2 text-base leading-relaxed list-decimal list-inside text-olive-ink/80 font-body">
      @for (step of content.steps; track $index) {
        <li>{{ step }}</li>
      }
    </ol>
  </div>

  <div>
    <h2 class="text-2xl font-bold text-olive-deep font-display">{{ content.faqTitle }}</h2>
    <div class="mt-4 space-y-3">
      @for (item of content.faqs; track item.q) {
        <details
          class="overflow-hidden transition-colors border group rounded-xl bg-olive-parchment border-olive-border hover:border-olive-ink/25"
        >
          <summary
            class="flex items-center justify-between gap-4 p-4 font-semibold cursor-pointer select-none text-olive-deep font-display sm:p-5"
          >
            <span>{{ item.q }}</span>
            <svg
              class="flex-shrink-0 w-5 h-5 tc-plus text-posthog-orange"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </summary>
          <div class="px-4 pb-4 -mt-1 text-sm leading-6 text-olive-ink/70 font-body sm:px-5 sm:pb-5">
            {{ item.a }}
          </div>
        </details>
      }
    </div>
  </div>
</section>
