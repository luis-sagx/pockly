<div class="bg-olive-cream rounded-lg border border-olive-light/40 p-4">
  <!-- Title input -->
  <div class="mb-3">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
      {{ t().noteTitle }}
    </label>
    <input
      type="text"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)"
      [placeholder]="t().noteTitlePlaceholder"
      maxlength="200"
      class="w-full px-3 py-2 text-sm bg-white border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
    />
  </div>

  <!-- Description input -->
  <div class="mb-3">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
      {{ t().noteDescription }}
    </label>
    <textarea
      [ngModel]="description()"
      (ngModelChange)="description.set($event)"
      [placeholder]="t().noteDescriptionPlaceholder"
      rows="2"
      class="w-full px-3 py-2 text-sm bg-white border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
    ></textarea>
  </div>

  <!-- Category input -->
  <div class="mb-3">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
      {{ t().noteCategory }}
    </label>
    <input
      type="text"
      [ngModel]="category()"
      (ngModelChange)="category.set($event)"
      [placeholder]="t().noteCategoryPlaceholder"
      maxlength="40"
      class="w-full px-3 py-2 text-sm bg-white border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
    />
  </div>

  <!-- Priority selector -->
  <div class="mb-4">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-2">
      {{ t().priorityHigh.split(' ')[0] }}
    </label>
    <div class="flex gap-2">
      <button
        type="button"
        (click)="setPriority('low')"
        class="flex-1 px-3 py-2 text-sm font-medium rounded-lg border-2 transition-colors"
        [class.border-green-500]="priority() === 'low'"
        [class.bg-green-50]="priority() === 'low'"
        [class.text-green-700]="priority() === 'low'"
        [class.border-olive-light]="priority() !== 'low'"
        [class.text-olive-ink/60]="priority() !== 'low'"
        [class.hover:border-green-300]="priority() !== 'low'"
      >
        <fa-icon [icon]="faArrowDown" class="mr-1"></fa-icon>
        {{ t().priorityLow }}
      </button>

      <button
        type="button"
        (click)="setPriority('medium')"
        class="flex-1 px-3 py-2 text-sm font-medium rounded-lg border-2 transition-colors"
        [class.border-amber-500]="priority() === 'medium'"
        [class.bg-amber-50]="priority() === 'medium'"
        [class.text-amber-700]="priority() === 'medium'"
        [class.border-olive-light]="priority() !== 'medium'"
        [class.text-olive-ink/60]="priority() !== 'medium'"
        [class.hover:border-amber-300]="priority() !== 'medium'"
      >
        <fa-icon [icon]="faMinus" class="mr-1"></fa-icon>
        {{ t().priorityMedium }}
      </button>

      <button
        type="button"
        (click)="setPriority('high')"
        class="flex-1 px-3 py-2 text-sm font-medium rounded-lg border-2 transition-colors"
        [class.border-red-500]="priority() === 'high'"
        [class.bg-red-50]="priority() === 'high'"
        [class.text-red-700]="priority() === 'high'"
        [class.border-olive-light]="priority() !== 'high'"
        [class.text-olive-ink/60]="priority() !== 'high'"
        [class.hover:border-red-300]="priority() !== 'high'"
      >
        <fa-icon [icon]="faArrowUp" class="mr-1"></fa-icon>
        {{ t().priorityHigh }}
      </button>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="submit()"
      [disabled]="!title().trim()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-olive-deep rounded-lg hover:opacity-80 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      <fa-icon [icon]="faPlus" class="text-xs"></fa-icon> {{ t().addNote }}
    </button>
    <button
      type="button"
      (click)="cancel()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream transition"
    >
      <fa-icon [icon]="faTimes" class="text-xs"></fa-icon> {{ t().cancel }}
    </button>
  </div>
</div>
