<div
  cdkDrag
  [cdkDragData]="note"
  [cdkDragDisabled]="showDeleteConfirm()"
  class="note-card group relative cursor-pointer border-l-4"
  [class.border-l-red-500]="note.priority === 'high'"
  [class.border-l-amber-500]="note.priority === 'medium'"
  [class.border-l-green-500]="note.priority === 'low'"
  (click)="onClick()"
>
  <!-- Category badge -->
  @if (note.category) {
    <span
      class="inline-block text-[10px] font-semibold uppercase tracking-wide text-olive-deep bg-olive-lightSage px-1.5 py-0.5 rounded mb-1.5 max-w-full truncate"
      [title]="note.category"
    >
      {{ note.category }}
    </span>
  }

  <!-- Title -->
  <h4 class="font-semibold text-sm text-olive-deep line-clamp-2 pr-8">
    {{ note.title }}
  </h4>

  <!-- Description snippet -->
  @if (note.description) {
    <p class="text-xs text-olive-ink/50 line-clamp-1 mt-1">
      {{ note.description }}
    </p>
  }

  <!-- Checklist badge -->
  @if (checklistBadge) {
    <div class="flex items-center gap-1 mt-2">
      <i class="fas fa-check-square text-xs text-olive-ink/40"></i>
      <span class="text-xs text-olive-ink/50">{{ checklistBadge }}</span>
    </div>
  }

  <!-- Delete button (hover) or inline confirm -->
  @if (showDeleteConfirm()) {
    <div
      class="absolute inset-0 flex items-center justify-center gap-1.5 bg-white/95 rounded-lg p-1.5"
      (click)="$event.stopPropagation()"
    >
      <span class="text-[11px] font-semibold text-red-600">{{ t().deleteNoteConfirm }}</span>
      <button
        (click)="confirmDelete($event)"
        class="px-2 py-1 text-[11px] font-semibold text-white bg-red-600 hover:bg-red-700 rounded transition"
        [attr.aria-label]="t().deleteNote"
      >
        <i class="fas fa-check"></i>
      </button>
      <button
        (click)="cancelDelete($event)"
        class="px-2 py-1 text-[11px] font-semibold text-olive-ink bg-olive-lightSage hover:bg-olive-cream rounded transition"
        [attr.aria-label]="t().cancel"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>
  } @else {
    <button
      class="absolute top-2 right-2 opacity-60 hover:opacity-100 transition-opacity p-1 text-olive-ink/90 hover:text-red-500 rounded"
      (click)="onDelete($event)"
      [attr.aria-label]="t().deleteNote"
    >
      <i class="fas fa-trash text-xs"></i>
    </button>
  }
</div>
