<div class="card">
  <div>
    <h2 class="section-heading">Image → Base64</h2>
    <p class="section-subtitle text-sm">Selecciona una imagen y obtén su Base64.</p>
  </div>

  <div class="mt-3">
    @if (!selectedImagePreviewUrl) {
      <app-drop-zone
        labelText="Click to select an image"
        subText="PNG, JPG, WEBP"
        (fileSelected)="onFilesSelected($event)"
      />
    }

    @if (selectedImagePreviewUrl) {
      <div class="flex flex-col gap-2 mt-3">
        <h3 class="label">Selected image:</h3>
        <div class="preview-container">
          <img
            [src]="selectedImagePreviewUrl"
            alt="Selected"
            class="object-contain max-w-full max-h-60"
          />
        </div>
      </div>
    }
  </div>

  @if (hasError) {
    <p class="error-message">
      <fa-icon [icon]="['fas', 'circle-exclamation']" class="w-4 h-4"></fa-icon>
      <span>{{ errorMessage }}</span>
    </p>
  }

  <div class="flex flex-wrap gap-2 mt-3">
    <button
      (click)="convertImageToBase64()"
      [disabled]="loading"
      [class]="loading ? 'btn-primary opacity-50 cursor-not-allowed' : 'btn-primary'"
    >
      @if (loading) {
        <fa-icon [icon]="['fas', 'spinner']" class="w-4 h-4 animate-spin"></fa-icon> Procesando...
      } @else {
        <fa-icon [icon]="['fas', 'image']" class="w-4 h-4"></fa-icon> Convertir a Base64
      }
    </button>

    <button (click)="clear()" class="btn-ghost">
      <fa-icon [icon]="['fas', 'trash']" class="w-4 h-4"></fa-icon> Limpiar
    </button>

    @if (base64Result) {
      <div class="ml-auto">
        <app-copy-button [textToCopy]="base64Result" />
      </div>
    }
  </div>

  @if (base64Result) {
    <div class="flex flex-col gap-2 mt-3">
      <h3 class="label">Base64 result:</h3>
      <div
        class="flex flex-col w-full h-64 overflow-hidden border rounded-xl bg-olive-cream border-olive-border"
      >
        <div class="flex-1 min-h-0 p-4 overflow-auto">
          <pre class="m-0 text-sm leading-relaxed whitespace-pre-wrap break-all text-olive-deep">{{
            base64Result
          }}</pre>
        </div>
      </div>
    </div>
  }
</div>
