<div class="flex flex-col gap-6 p-4 sm:p-6">
  <div>
    <h2 class="text-2xl font-bold tracking-tight text-[#23251d] font-display">{{ t().qrGenerator }}</h2>
    <p class="mt-1 text-sm text-[#4d4f46]">{{ t().qrGeneratorDesc }}</p>
  </div>

  <div
    class="flex flex-wrap items-end gap-4 p-4 border border-olive-border rounded-lg bg-[#eeefe9]"
  >
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-[#23251d]">
      {{ t().size }}
      <select
        [value]="size()"
        (change)="onSizeChange($any($event.target).value)"
        class="w-full px-4 py-2.5 bg-white border border-[#b6b7af] rounded-md text-[#23251d] focus:outline-none focus:ring-2 focus:ring-posthog-amber/50"
      >
        <option value="small">{{ t().smallSize }}</option>
        <option value="medium">{{ t().mediumSize }}</option>
        <option value="large">{{ t().largeSize }}</option>
      </select>
    </label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-[#23251d]">
      {{ t().color }}
      <input
        type="color"
        [value]="fgColor()"
        (input)="onColorChange($any($event.target).value)"
        class="w-12 h-10 bg-transparent border-0 cursor-pointer rounded"
      />
    </label>
  </div>

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-[#23251d]">{{ t().content }}</label>
    <app-input-box
      [value]="inputText()"
      (valueChange)="onInputChange($event)"
      [placeholder]="t().enterTextOrUrl"
      [multiline]="true"
      [rows]="4"
      inputClass="w-full px-4 py-3 bg-[#eeefe9] border border-[#b6b7af] rounded-md text-[#23251d] placeholder:text-[#9ea096] focus:outline-none focus:ring-2 focus:ring-posthog-amber/50 resize-none"
    ></app-input-box>
  </div>

  @if (error()) {
    <p class="flex items-center gap-2 text-sm font-semibold text-red-600">
      <fa-icon [icon]="['fas', 'circle-exclamation']"></fa-icon>
      {{ error() }}
    </p>
  }

  @if (loading()) {
    <div class="flex items-center justify-center p-6">
      <svg class="w-8 h-8 animate-spin text-[#1e1f23]" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
    </div>
  }

  @if (qrDataUrl()) {
    <div
      class="flex flex-col items-center gap-4 p-4 border border-olive-border rounded-lg bg-[#eeefe9]"
    >
      <img [src]="qrDataUrl()" alt="QR Code" class="border border-[#bfc1b7] rounded-lg" />
      <button
        (click)="download()"
        class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-base font-semibold text-white transition-all duration-150 rounded-md bg-[#1e1f23] hover:opacity-70 active:opacity-80"
      >
        <fa-icon [icon]="['fas', 'download']"></fa-icon>
        {{ t().downloadPng }}
      </button>
    </div>
  }
</div>
