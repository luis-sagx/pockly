<div class="flex flex-col gap-6 p-4 sm:p-6">
  <!-- Sync error banner -->
  @if (syncError()) {
    <div class="px-4 py-2 text-sm font-medium text-amber-800 bg-amber-100 border border-amber-300 rounded-lg">
      {{ syncError() }}
    </div>
  }
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">
        {{ t().quickNotes }}
      </h2>
      <p class="mt-1 text-sm text-olive-ink/70">{{ t().quickNotesDesc }}</p>
    </div>
    <button
      (click)="showCreateForm.set(!showCreateForm())"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-olive-deep rounded-lg hover:opacity-80 transition"
    >
      <fa-icon [icon]="faPlus"></fa-icon> {{ t().createNote }}
    </button>
  </div>

  <!-- Create Form (collapsible) -->
  @if (showCreateForm()) {
    <app-create-note-form
      (created)="createNote($event); showCreateForm.set(false)"
      (cancelled)="showCreateForm.set(false)"
    />
  }

  <!-- 3 Columns Grid -->
  <div class="columns-container" cdkDropListGroup>
    <app-note-column
      priority="low"
      [notes]="lowNotes()"
      (dropped)="onNoteDropped($event)"
      (reordered)="onColumnReordered($event, 'low')"
      (noteClicked)="onNoteClicked($event)"
      (noteDeleted)="deleteNote($event)"
    />

    <app-note-column
      priority="medium"
      [notes]="mediumNotes()"
      (dropped)="onNoteDropped($event)"
      (reordered)="onColumnReordered($event, 'medium')"
      (noteClicked)="onNoteClicked($event)"
      (noteDeleted)="deleteNote($event)"
    />

    <app-note-column
      priority="high"
      [notes]="highNotes()"
      (dropped)="onNoteDropped($event)"
      (reordered)="onColumnReordered($event, 'high')"
      (noteClicked)="onNoteClicked($event)"
      (noteDeleted)="deleteNote($event)"
    />
  </div>

  <!-- Detail Modal -->
  @if (showDetail() && activeNote()) {
    <app-note-detail
      [note]="activeNote()"
      [open]="showDetail()"
      (saved)="onNoteSaved($event)"
      (closed)="onDetailClosed()"
    />
  }
</div>
