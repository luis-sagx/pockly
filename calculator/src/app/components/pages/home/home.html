<div class="flex flex-col items-center justify-center min-h-[70vh] gap-8 p-6">
  <div class="text-center">
    <div class="flex items-center justify-center gap-3 mb-4">
      <app-icon name="percent" class="w-12 h-12 text-brand-400"></app-icon>
    </div>
    <h1 class="text-4xl font-bold tracking-tight text-brand-100">Calculator Tools</h1>
    <p class="mt-2 text-zinc-400">Free online calculators — no signup, no ads.</p>
  </div>
  <div class="grid gap-4 w-full max-w-2xl sm:grid-cols-1">
    @for (tool of toolList; track tool.path) {
    <button (click)="navigate(tool.path)" class="flex flex-col items-start p-5 text-left transition border bg-zinc-950/60 border-zinc-800 rounded-2xl hover:border-brand-500 hover:bg-zinc-900/60">
      <div class="flex items-center gap-3 mb-2">
        <app-icon [name]="tool.icon" class="w-5 h-5 text-brand-500"></app-icon>
        <span class="text-lg font-semibold text-slate-100">{{ tool.label }}</span>
      </div>
      <p class="text-sm text-zinc-500">{{ tool.description }}</p>
    </button>
    }
  </div>
</div>
