<div class="flex flex-col gap-6 p-4 sm:p-6 rounded-lg border border-olive-border bg-olive-parchment">
  <div>
    <h2 class="text-2xl font-bold tracking-tight text-olive-deep font-display">QR Generator</h2>
    <p class="mt-1 text-sm text-olive-ink">Generate QR codes from text and URLs.</p>
  </div>
  <div class="flex flex-wrap items-end gap-4 p-4 border border-olive-border rounded-lg bg-olive-cream">
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-olive-ink">Size<select [value]="size()" (change)="onSizeChange($any($event.target).value)" class="input-field py-2"><option value="small">Small (128px)</option><option value="medium">Medium (256px)</option><option value="large">Large (512px)</option></select></label>
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-olive-ink">Color<input type="color" [value]="fgColor()" (input)="onColorChange($any($event.target).value)" class="w-10 h-10 bg-transparent border-0 cursor-pointer" /></label>
  </div>
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">Content</label>
    <textarea [value]="inputText()" (input)="onInputChange($any($event.target).value)" rows="3" placeholder="Enter text or URL..." class="input-field resize-none"></textarea>
  </div>
  @if (error()) { <p class="flex items-center gap-2 text-sm font-semibold text-red-600"><app-icon name="alert-circle" class="w-4 h-4"></app-icon> {{ error() }}</p> }
  @if (qrDataUrl()) {
  <div class="flex flex-col items-center gap-4 p-4 border border-olive-border rounded-lg">
    <img [src]="qrDataUrl()" alt="QR Code" class="border border-olive-border rounded-lg" />
    <button (click)="download()" class="btn-primary"><app-icon name="download" class="w-4 h-4"></app-icon> Download PNG</button>
  </div>
  }
</div>
