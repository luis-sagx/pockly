<div class="flex flex-col gap-6 p-4 sm:p-6">
  <div>
    <h2 class="text-3xl font-display font-bold tracking-tight text-olive-deep">JSON Templates</h2>
    <p class="mt-1 text-sm text-olive-muted">Pre-built JSON structures for common use cases.</p>
  </div>

  <div class="flex flex-wrap gap-2">
    <button
      (click)="setCategory('all')"
      [class]="
        activeCategory() === 'all'
          ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber'
          : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'
      "
    >
      All
    </button>
    <button
      (click)="setCategory('simple')"
      [class]="
        activeCategory() === 'simple'
          ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber'
          : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'
      "
    >
      Simple
    </button>
    <button
      (click)="setCategory('common')"
      [class]="
        activeCategory() === 'common'
          ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber'
          : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'
      "
    >
      Common
    </button>
    <button
      (click)="setCategory('complex')"
      [class]="
        activeCategory() === 'complex'
          ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber'
          : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'
      "
    >
      Complex
    </button>
  </div>

  <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (template of filteredTemplates; track template.name) {
      <button
        (click)="selectTemplate(template)"
        class="flex flex-col items-start p-4 text-left transition border bg-olive-cream border-olive-border rounded-xl hover:border-posthog-orange"
      >
        <div class="flex items-center gap-2 mb-1">
          <i [class]="'fas ' + template.icon + ' text-posthog-orange'"></i>
          <span class="font-semibold text-olive-deep text-sm">{{ template.name }}</span>
        </div>
        <span class="text-xs text-olive-muted">{{ template.description }}</span>
        <span
          class="mt-2 px-2 py-0.5 text-xs font-semibold bg-olive-lightSage text-olive-muted rounded"
          >{{ getCategoryLabel(template.category) }}</span
        >
      </button>
    }
  </div>

  <!-- Modal -->
  @if (selectedTemplate()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50" (click)="clearTemplate()">
      <div
        class="relative w-full max-w-2xl max-h-[85vh] flex flex-col bg-white rounded-xl shadow-2xl overflow-hidden"
        (click)="$event.stopPropagation()"
      >
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-olive-border bg-olive-cream shrink-0">
          <div class="flex items-center gap-2">
            <i [class]="'fas ' + selectedTemplate()!.icon + ' text-posthog-orange'"></i>
            <span class="font-semibold text-olive-deep">{{ selectedTemplate()!.name }}</span>
            <span class="px-2 py-0.5 text-xs font-semibold bg-olive-lightSage text-olive-muted rounded">
              {{ getCategoryLabel(selectedTemplate()!.category) }}
            </span>
          </div>
          <div class="flex items-center gap-2">
            <button
              (click)="copyTemplate(formatJson(selectedTemplate()!.content))"
              class="flex items-center gap-2 px-3 py-1.5 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-70 hover:text-posthog-amber"
            >
              @if (!copied()) {
                <app-icon name="copy" class="w-4 h-4"></app-icon>
                <span>Copy</span>
              } @else {
                <app-icon name="check" class="w-4 h-4"></app-icon>
                <span>Copied!</span>
              }
            </button>
            <button
              (click)="clearTemplate()"
              class="p-2 text-olive-muted hover:text-olive-deep transition rounded-lg hover:bg-olive-lightSage"
            >
              <app-icon name="x" class="w-5 h-5"></app-icon>
            </button>
          </div>
        </div>

        <!-- Body -->
        <div class="flex-1 overflow-auto p-4">
          <pre class="text-sm font-mono text-olive-ink whitespace-pre-wrap break-all">{{ formatJson(selectedTemplate()!.content) }}</pre>
        </div>
      </div>
    </div>
  }
</div>
