<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-2xl bg-olive-parchment text-olive-ink shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]"
>
  <div>
    <h2 class="text-3xl font-display font-bold tracking-tight text-olive-deep">JSON Utils</h2>
    <p class="mt-1 text-sm text-olive-muted">Format, transform, and manipulate JSON data.</p>
  </div>

  <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-4">
    @for (util of utils; track util.value) {
    <button
      (click)="setUtil(util.value)"
      [class]="activeUtil() === util.value ? 'p-3 text-left border-2 bg-olive-cream border-posthog-orange rounded-xl' : 'p-3 text-left border bg-olive-cream border-olive-border rounded-xl hover:border-posthog-orange'"
    >
      <div class="flex items-center gap-2 mb-1">
        <i [class]="'fas ' + util.icon + ' ' + (activeUtil() === util.value ? 'text-posthog-orange' : 'text-olive-muted')"></i>
        <span class="font-semibold text-olive-deep">{{ util.label }}</span>
      </div>
      <p class="text-xs text-olive-muted">{{ util.description }}</p>
    </button>
    }
  </div>

  @if (error()) {
  <p class="flex items-center gap-2 text-sm text-red-600"><app-icon name="alert" class="w-4 h-4"></app-icon> {{ error() }}</p>
  }

  @if (activeUtil() === 'diff') {
  <div class="grid gap-4 sm:grid-cols-1 lg:grid-cols-2">
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-olive-ink">JSON 1:</label>
      <textarea [value]="input()" (input)="input.set($any($event.target).value)" placeholder='{"key": "value1"}' rows="6" class="w-full p-3 text-sm font-mono text-green-600 placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"></textarea>
    </div>
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-olive-ink">JSON 2:</label>
      <textarea [value]="input2()" (input)="input2.set($any($event.target).value)" placeholder='{"key": "value2"}' rows="6" class="w-full p-3 text-sm font-mono text-green-600 placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"></textarea>
    </div>
  </div>
  } @else if (activeUtil() === 'query') {
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">JSON Input:</label>
    <textarea [value]="input()" (input)="input.set($any($event.target).value)" placeholder='{"users": [{"name": "John"}]}' rows="6" class="w-full p-3 text-sm font-mono text-green-600 placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"></textarea>
  </div>
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">JSONPath Query:</label>
    <input [value]="input2()" (input)="input2.set($any($event.target).value)" placeholder="users.0.name" class="w-full px-3 py-2 text-sm font-mono text-yellow-600 placeholder:text-olive-placeholder bg-olive-cream border border-olive-border rounded-lg focus:outline-none focus:ring-2 focus:ring-posthog-orange/50" />
    <p class="text-xs text-olive-muted">Examples: users, users.0, users[*].name, data.items[0]</p>
  </div>
  } @else {
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">Input JSON:</label>
    <textarea [value]="input()" (input)="input.set($any($event.target).value)" placeholder='{"key": "value"}' rows="6" class="w-full p-3 text-sm font-mono text-green-600 placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-border rounded-xl focus:outline-none focus:ring-2 focus:ring-posthog-orange/50"></textarea>
  </div>
  }

  <button (click)="apply()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-70 hover:text-posthog-amber">
    <app-icon name="play" class="w-4 h-4"></app-icon> Apply {{ getActiveUtilLabel() }}
  </button>

  @if (output()) {
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">Result:</label>
    <app-output-box [text]="output()" />
  </div>
  }
</div>
