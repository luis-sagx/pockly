<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-lg bg-olive-parchment shadow-lg"
>
  <div>
    <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">
      {{ t().uppercaseAndLowercaseConverter }}
    </h2>
    <p class="mt-1 text-sm text-olive-ink/70">
      {{ t().convertTextToUppercase }}
    </p>
  </div>
  <app-input-box
    [value]="inputText"
    (valueChange)="inputText = $event"
    [rows]="5"
    [placeholder]="t().enterTextHereToConvert"
    inputClass="w-full p-4 text-olive-deep placeholder:text-olive-placeholder bg-olive-cream border resize-none border-olive-light rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50"
  />
  @if (hasError) {
    <p class="flex items-center gap-2 text-sm font-semibold text-red-600">
      <i class="fas fa-exclamation-triangle"></i> {{ t().pleaseEnterValidText }}
    </p>
  }
  <div class="flex flex-wrap gap-2">
    <button
      (click)="toUpper()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-80"
    >
      <i class="fas fa-arrow-up-a-z"></i> {{ t().uppercase }}
    </button>
    <button
      (click)="toLower()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-80"
    >
      <i class="fas fa-arrow-down-a-z"></i> {{ t().lowercase }}
    </button>
    <button
      (click)="toCapital()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-80"
    >
      <i class="fas fa-a"></i> {{ t().capitalize }}
    </button>
    <button
      (click)="clear()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-olive-ink transition bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange"
    >
      <i class="fas fa-trash"></i> {{ t().clear }}
    </button>
  </div>
  <div class="flex flex-col gap-2">
    <h3 class="text-sm font-bold text-olive-deep font-display">{{ t().result }}</h3>
    <app-output-box [text]="outputText" />
  </div>
</div>
