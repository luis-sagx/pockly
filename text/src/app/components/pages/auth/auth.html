<div class="min-h-screen flex items-start justify-center pt-16 sm:pt-24 px-4">
  <div class="w-full max-w-md">

    <!-- Page Title -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">
        Quick Notes
      </h2>
      <p class="mt-2 text-sm text-olive-ink/70">
        Sign in to sync your notes across devices
      </p>
    </div>

    <!-- Auth Card -->
    <div class="bg-white rounded-xl shadow-sm border border-olive-light/30 overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-olive-light/30">
        <button
          (click)="isSignUp.set(false)"
          class="flex-1 py-3 text-sm font-semibold transition-colors"
          [class.bg-white]="!isSignUp()"
          [class.text-olive-deep]="!isSignUp()"
          [class.bg-olive-parchment/50]="isSignUp()"
          [class.text-olive-ink/50]="isSignUp()"
        >
          Sign in
        </button>
        <button
          (click)="isSignUp.set(true)"
          class="flex-1 py-3 text-sm font-semibold transition-colors"
          [class.bg-white]="isSignUp()"
          [class.text-olive-deep]="isSignUp()"
          [class.bg-olive-parchment/50]="!isSignUp()"
          [class.text-olive-ink/50]="!isSignUp()"
        >
          Create account
        </button>
      </div>

      <!-- Form -->
      <div class="p-6 space-y-4">
        @if (isSignUp()) {
          <div>
            <label class="block text-xs font-semibold text-olive-ink/70 mb-1">Username</label>
            <input
              type="text"
              [ngModel]="username()"
              (ngModelChange)="username.set($event)"
              placeholder="yourname"
              autocomplete="username"
              maxlength="30"
              class="w-full px-3 py-2 text-sm border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
            />
          </div>
        }

        <div>
          <label class="block text-xs font-semibold text-olive-ink/70 mb-1">Email</label>
          <input
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="you@example.com"
            autocomplete="email"
            class="w-full px-3 py-2 text-sm border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
          />
        </div>

        <div>
          <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
            Password
            @if (isSignUp()) {
              <span class="font-normal text-olive-ink/40">(min. 8 chars)</span>
            }
          </label>
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            (keydown.enter)="submit()"
            placeholder="{{ isSignUp() ? 'Min. 8 characters' : 'Your password' }}"
            autocomplete="{{ isSignUp() ? 'new-password' : 'current-password' }}"
            class="w-full px-3 py-2 text-sm border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
          />
        </div>

        <button
          (click)="submit()"
          [disabled]="!email().trim() || !password() || loading()"
          class="w-full px-4 py-2.5 text-sm font-semibold text-white bg-olive-deep rounded-lg hover:opacity-80 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isSignUp() ? 'Create account' : 'Sign in' }}
        </button>

        <div class="flex items-center gap-3 py-1">
          <div class="flex-1 h-px bg-olive-light/50"></div>
          <span class="text-xs text-olive-ink/40">or</span>
          <div class="flex-1 h-px bg-olive-light/50"></div>
        </div>

        <button
          (click)="onGoogleSignIn()"
          [disabled]="loading()"
          class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium border border-olive-light rounded-lg hover:bg-olive-cream transition disabled:opacity-50"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Messages -->
        @if (error()) {
          <p class="text-sm text-red-600 bg-red-50 rounded-lg px-4 py-2 text-center">{{ error() }}</p>
        }
        @if (success()) {
          <p class="text-sm text-green-700 bg-green-50 rounded-lg px-4 py-2 text-center">{{ success() }}</p>
        }
      </div>
    </div>

    <!-- Back link -->
    <div class="text-center mt-6">
      <a routerLink="/" class="text-sm text-olive-ink/50 hover:text-olive-deep transition">
        ← Back to tools
      </a>
    </div>

  </div>
</div>
