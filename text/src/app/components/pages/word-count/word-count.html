<div class="flex flex-col gap-6 p-4 sm:p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]">
  <div>
    <h2 class="text-3xl font-semibold tracking-tight text-brand-100">Word Counter</h2>
    <p class="mt-1 text-sm text-zinc-500">Count words and characters in your text.</p>
  </div>
  <app-input-box [value]="inputText()" (valueChange)="inputText.set($event)" [rows]="5" placeholder="Enter text here..." inputClass="w-full p-4 text-slate-100 placeholder:text-zinc-600 bg-zinc-900 border resize-none border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500" />
  <button (click)="clear()" class="self-start flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-200 transition bg-zinc-800 rounded-lg hover:bg-zinc-700"><i class="fas fa-trash"></i> Clear</button>
  <div class="flex flex-col gap-2">
    <h3 class="text-sm font-semibold text-slate-300">Results:</h3>
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-zinc-500">Word Count</span>
        <div class="p-3 font-mono text-lg text-slate-100 bg-zinc-900 border border-zinc-700 rounded-lg">{{ wordCount() }}</div>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-xs font-medium text-zinc-500">Character Count</span>
        <div class="p-3 font-mono text-lg text-slate-100 bg-zinc-900 border border-zinc-700 rounded-lg">{{ charCount() }}</div>
      </div>
    </div>
  </div>
</div>
