<div class="relative">
  <button
    (click)="toggle()"
    class="relative flex items-center justify-center w-8 h-8 rounded-lg text-olive-ink hover:text-posthog-orange hover:bg-olive-cream transition"
    aria-label="Notifications"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
      />
    </svg>
    @if (count() > 0) {
      <span
        class="absolute -top-0.5 -right-0.5 flex items-center justify-center w-4 h-4 text-xs font-bold text-white bg-posthog-orange rounded-full"
      >
        {{ count() }}
      </span>
    }
  </button>

  @if (isOpen()) {
    <div
      class="absolute right-0 mt-2 w-72 bg-olive-parchment border border-olive-border rounded-xl shadow-lg z-50 overflow-hidden"
    >
      <div class="px-4 py-3 border-b border-olive-border flex items-center justify-between">
        <span class="text-sm font-semibold text-olive-ink">Notifications</span>
        <a
          routerLink="/settings/notifications"
          (click)="close()"
          class="text-xs text-olive-ink/60 hover:text-posthog-orange transition"
        >
          Settings
        </a>
      </div>
      @if (notifications().length === 0) {
        <p class="px-4 py-6 text-sm text-center text-olive-ink/50">All caught up!</p>
      } @else {
        <ul>
          @for (n of notifications(); track n.id) {
            <li class="px-4 py-3 border-b border-olive-border/50 last:border-0">
              <p class="text-sm text-olive-ink">{{ n.message }}</p>
            </li>
          }
        </ul>
      }
    </div>
  }
</div>
