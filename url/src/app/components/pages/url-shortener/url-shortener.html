<div class="flex flex-col gap-6 p-4 sm:p-6 rounded-lg border border-olive-border bg-olive-parchment">
  <div>
    <h2 class="text-2xl font-bold tracking-tight text-olive-deep font-display">URL Shortener</h2>
    <p class="mt-1 text-sm text-olive-ink">Shorten your long URLs instantly.</p>
  </div>
  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-olive-ink">Enter URL to shorten</label>
    <input type="url" [value]="inputUrl()" (input)="onInputChange($any($event.target).value)" placeholder="https://example.com/very/long/url" class="input-field" />
  </div>
  @if (error()) { <p class="flex items-center gap-2 text-sm font-semibold text-red-600"><app-icon name="alert-circle" class="w-4 h-4"></app-icon> {{ error() }}</p> }
  <div class="flex flex-wrap gap-2">
    <button (click)="shorten()" [disabled]="loading()" class="btn-primary">@if (loading()) { <app-icon name="loader" class="w-4 h-4 animate-spin"></app-icon> Shortening... } @else { <app-icon name="compress"></app-icon> Shorten URL }</button>
    <button (click)="clear()" class="btn-ghost"><app-icon name="trash-2" class="w-4 h-4"></app-icon> Clear</button>
  </div>
  @if (shortenedUrl()) {
  <div class="flex flex-col gap-3 p-4 border border-olive-border rounded-lg bg-olive-cream">
    <span class="text-sm font-semibold text-olive-ink">Shortened URL:</span>
    <div class="flex items-center gap-2">
      <input [value]="shortenedUrl()" readonly class="flex-1 px-3 py-2 font-mono text-posthog-orange bg-transparent border border-olive-border rounded" />
      <app-copy-button [textToCopy]="shortenedUrl()" />
    </div>
    <a [href]="shortenedUrl()" target="_blank" rel="noopener noreferrer" class="text-sm text-posthog-orange hover:underline flex items-center gap-1">Open shortened URL <app-icon name="external-link" class="w-4 h-4"></app-icon></a>
  </div>
  }
</div>
