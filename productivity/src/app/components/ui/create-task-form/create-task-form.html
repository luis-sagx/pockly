<div class="bg-olive-cream rounded-lg border border-olive-light/40 p-4">
  <div class="mb-3">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
      {{ t().noteTitle }}
    </label>
    <input
      type="text"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)"
      [placeholder]="t().noteTitlePlaceholder"
      maxlength="200"
      class="w-full px-3 py-2 text-sm bg-white border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50"
    />
  </div>

  <div class="mb-3">
    <label class="block text-xs font-semibold text-olive-ink/70 mb-1">
      {{ t().noteDescription }}
    </label>
    <textarea
      [ngModel]="description()"
      (ngModelChange)="description.set($event)"
      [placeholder]="t().noteDescriptionPlaceholder"
      rows="2"
      class="w-full px-3 py-2 text-sm bg-white border border-olive-light rounded-lg text-olive-deep placeholder:text-olive-placeholder focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none"
    ></textarea>
  </div>

  <div class="mb-4 flex items-center gap-3">
    <span class="text-xs font-semibold text-olive-ink/70">{{ t().priority }}</span>
    <div class="flex gap-1.5">
      <button
        type="button"
        (click)="setPriority('low')"
        class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
        [class.bg-green-500]="priority() === 'low'"
        [class.border-green-500]="priority() === 'low'"
        [class.text-white]="priority() === 'low'"
        [class.border-green-300]="priority() !== 'low'"
        [class.text-green-700]="priority() !== 'low'"
      >{{ t().priorityLow }}</button>

      <button
        type="button"
        (click)="setPriority('medium')"
        class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
        [class.bg-amber-500]="priority() === 'medium'"
        [class.border-amber-500]="priority() === 'medium'"
        [class.text-white]="priority() === 'medium'"
        [class.border-amber-300]="priority() !== 'medium'"
        [class.text-amber-700]="priority() !== 'medium'"
      >{{ t().priorityMedium }}</button>

      <button
        type="button"
        (click)="setPriority('high')"
        class="px-3 py-1 text-xs font-semibold rounded-full border transition-all"
        [class.bg-red-500]="priority() === 'high'"
        [class.border-red-500]="priority() === 'high'"
        [class.text-white]="priority() === 'high'"
        [class.border-red-300]="priority() !== 'high'"
        [class.text-red-700]="priority() !== 'high'"
      >{{ t().priorityHigh }}</button>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="submit()"
      [disabled]="!title().trim()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-olive-deep rounded-lg hover:opacity-80 disabled:opacity-50 disabled:cursor-not-allowed transition"
    >
      <fa-icon [icon]="faPlus" class="text-xs"></fa-icon> {{ t().addTask }}
    </button>
    <button
      type="button"
      (click)="cancel()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream transition"
    >
      <fa-icon [icon]="faTimes" class="text-xs"></fa-icon> {{ t().cancel }}
    </button>
  </div>
</div>
