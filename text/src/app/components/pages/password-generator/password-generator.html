<div class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-lg bg-olive-parchment shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]">
  <div>
    <h2 class="text-3xl font-bold tracking-tight text-olive-deep font-display">Password Generator</h2>
    <p class="mt-1 text-sm text-olive-ink/70">Generate secure passwords with custom options.</p>
  </div>
  <div class="flex flex-wrap items-end gap-6 p-4 bg-olive-cream border border-olive-light rounded-lg">
    <div class="flex flex-col gap-2 min-w-[200px]">
      <label class="text-sm font-semibold text-olive-deep">Length: <span class="text-posthog-orange">{{ length() }}</span></label>
      <input type="range" min="8" max="64" [value]="length()" (input)="length.set(+($any($event.target).value))" class="w-full h-2 bg-olive-lightSage rounded-lg appearance-none cursor-pointer accent-posthog-orange" />
      <div class="flex justify-between text-xs text-olive-placeholder"><span>8</span><span>64</span></div>
    </div>
    <div class="flex flex-col gap-3">
      <label class="flex items-center gap-2 text-sm cursor-pointer text-olive-ink"><input type="checkbox" [checked]="includeUppercase()" (change)="includeUppercase.set($any($event.target).checked)" class="w-4 h-4 accent-posthog-orange" /> Uppercase (A-Z)</label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-olive-ink"><input type="checkbox" [checked]="includeLowercase()" (change)="includeLowercase.set($any($event.target).checked)" class="w-4 h-4 accent-posthog-orange" /> Lowercase (a-z)</label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-olive-ink"><input type="checkbox" [checked]="includeNumbers()" (change)="includeNumbers.set($any($event.target).checked)" class="w-4 h-4 accent-posthog-orange" /> Numbers (0-9)</label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-olive-ink"><input type="checkbox" [checked]="includeSymbols()" (change)="includeSymbols.set($any($event.target).checked)" class="w-4 h-4 accent-posthog-orange" /> Symbols (!@#$%...)</label>
    </div>
  </div>
  <button (click)="generate()" [disabled]="!canGenerate()" class="flex items-center gap-2 px-6 py-3 text-base font-semibold text-white transition bg-olive-deep rounded-xl hover:opacity-80 disabled:opacity-50 disabled:cursor-not-allowed">
    <i class="fas fa-key"></i> Generate Password
  </button>
  @if (generatedPassword()) {
  <div class="flex flex-col gap-3">
    <div class="flex items-center gap-2">
      <h3 class="text-sm font-bold text-olive-deep font-display">Generated Password:</h3>
      <app-copy-button [textToCopy]="generatedPassword()" />
    </div>
    <div class="flex items-center gap-3 p-4 bg-olive-cream border border-olive-light rounded-lg">
      <code class="flex-1 text-lg font-mono text-olive-deep break-all">{{ generatedPassword() }}</code>
    </div>
    <button (click)="regenerate()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-olive-deep rounded-lg hover:opacity-80 w-fit">
      <i class="fas fa-sync"></i> Regenerate
    </button>
  </div>
  }
</div>
