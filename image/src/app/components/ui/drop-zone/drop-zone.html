<label
  (drop)="onDrop($event)"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  class="drop-zone"
  [class.drop-zone-hover]="isDragOver()"
>
  <svg class="w-10 h-10 mb-2 text-olive-placeholder" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
  </svg>
  <span class="drop-zone-text">{{ labelText }}</span>
  <span class="drop-zone-subtext">{{ subText }}</span>
  <input
    type="file"
    [accept]="accept"
    [multiple]="multiple"
    class="hidden"
    (change)="onFileSelected($event)"
  />
</label>
