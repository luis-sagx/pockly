<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]"
>
  <div>
    <h2 class="text-3xl font-semibold tracking-tight text-brand-100">
      Password Generator
    </h2>
    <p class="mt-1 text-sm text-zinc-500">
      Generate secure passwords with custom options.
    </p>
  </div>

  <!-- Options -->
  <div class="flex flex-wrap items-end gap-6 p-4 bg-zinc-900/60 border border-zinc-800 rounded-xl">
    <!-- Length Slider -->
    <div class="flex flex-col gap-2 min-w-[200px]">
      <label class="text-sm font-semibold text-slate-300">
        Length: <span class="text-brand-400">{{ length() }}</span>
      </label>
      <input
        type="range"
        min="8"
        max="64"
        [value]="length()"
        (input)="length.set(+($any($event.target).value))"
        class="w-full h-2 bg-zinc-700 rounded-lg appearance-none cursor-pointer accent-brand-500"
      />
      <div class="flex justify-between text-xs text-zinc-500">
        <span>8</span>
        <span>64</span>
      </div>
    </div>

    <!-- Character Options -->
    <div class="flex flex-col gap-3">
      <label class="flex items-center gap-2 text-sm cursor-pointer text-zinc-300">
        <input
          type="checkbox"
          [checked]="includeUppercase()"
          (change)="includeUppercase.set($any($event.target).checked)"
          class="w-4 h-4 accent-brand-600"
        />
        Uppercase (A-Z)
      </label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-zinc-300">
        <input
          type="checkbox"
          [checked]="includeLowercase()"
          (change)="includeLowercase.set($any($event.target).checked)"
          class="w-4 h-4 accent-brand-600"
        />
        Lowercase (a-z)
      </label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-zinc-300">
        <input
          type="checkbox"
          [checked]="includeNumbers()"
          (change)="includeNumbers.set($any($event.target).checked)"
          class="w-4 h-4 accent-brand-600"
        />
        Numbers (0-9)
      </label>
      <label class="flex items-center gap-2 text-sm cursor-pointer text-zinc-300">
        <input
          type="checkbox"
          [checked]="includeSymbols()"
          (change)="includeSymbols.set($any($event.target).checked)"
          class="w-4 h-4 accent-brand-600"
        />
        Symbols (!&#64;#$%...)
      </label>
    </div>
  </div>

  <!-- Generate Button -->
  <button
    (click)="generate()"
    [disabled]="!canGenerate()"
    class="flex items-center gap-2 px-6 py-3 text-base font-medium text-white transition bg-brand-600 rounded-xl hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed"
  >
    <i class="fas fa-key"></i>
    Generate Password
  </button>

  <!-- Result -->
  @if (generatedPassword()) {
  <div class="flex flex-col gap-3">
    <div class="flex items-center gap-2">
      <h3 class="text-sm font-semibold text-slate-300">Generated Password:</h3>
      <app-copy-button [textToCopy]="generatedPassword()" />
    </div>
    <div
      class="flex items-center gap-3 p-4 bg-neutral-900 border border-zinc-800 rounded-xl"
    >
      <code class="flex-1 text-lg font-mono text-brand-300 break-all">{{
        generatedPassword()
      }}</code>
    </div>
    <button
      (click)="regenerate()"
      class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white transition bg-brand-600 rounded-lg hover:bg-brand-700 w-fit"
    >
      <i class="fas fa-sync"></i>
      Regenerate
    </button>
  </div>
  }
</div>
