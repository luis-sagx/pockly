<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-olive-border rounded-2xl bg-olive-parchment text-olive-ink shadow-[0_25px_50px_-12px_rgba(0,0,0,0.25)]"
>
  <div>
    <h2 class="text-3xl font-display font-bold tracking-tight text-olive-deep">JSON Templates</h2>
    <p class="mt-1 text-sm text-olive-muted">Pre-built JSON structures for common use cases.</p>
  </div>

  <div class="flex flex-wrap gap-2">
    <button (click)="setCategory('all')" [class]="activeCategory() === 'all' ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber' : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'">All</button>
    <button (click)="setCategory('simple')" [class]="activeCategory() === 'simple' ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber' : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'">Simple</button>
    <button (click)="setCategory('common')" [class]="activeCategory() === 'common' ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber' : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'">Common</button>
    <button (click)="setCategory('complex')" [class]="activeCategory() === 'complex' ? 'px-3 py-1.5 text-sm font-semibold bg-olive-deep text-white rounded-lg hover:opacity-70 hover:text-posthog-amber' : 'px-3 py-1.5 text-sm font-semibold text-olive-ink bg-olive-lightSage rounded-lg hover:bg-olive-cream hover:text-posthog-orange'">Complex</button>
  </div>

  <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (template of filteredTemplates; track template.name) {
    <button (click)="selectTemplate(template)" class="flex flex-col items-start p-4 text-left transition border bg-olive-cream border-olive-border rounded-xl hover:border-posthog-orange">
      <div class="flex items-center gap-2 mb-1">
        <i [class]="'fas ' + template.icon + ' text-posthog-orange'"></i>
        <span class="font-semibold text-olive-deep text-sm">{{ template.name }}</span>
      </div>
      <span class="text-xs text-olive-muted">{{ template.description }}</span>
      <span class="mt-2 px-2 py-0.5 text-xs font-semibold bg-olive-lightSage text-olive-muted rounded">{{ getCategoryLabel(template.category) }}</span>
    </button>
    }
  </div>

  @if (selectedTemplate()) {
  <div class="flex flex-col rounded-xl border border-olive-border overflow-hidden">
    <div class="flex items-center justify-between p-3 bg-olive-cream border-b border-olive-border">
      <div class="flex items-center gap-2">
        <i [class]="'fas ' + selectedTemplate()!.icon + ' text-posthog-orange'"></i>
        <span class="font-medium text-olive-deep">{{ selectedTemplate()!.name }}</span>
        <span class="px-2 py-0.5 text-xs font-semibold bg-olive-lightSage text-olive-muted rounded">{{ getCategoryLabel(selectedTemplate()!.category) }}</span>
      </div>
      <button (click)="clearTemplate()" class="flex items-center gap-2 px-3 py-1.5 text-sm text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 rounded-lg transition">
        <app-icon name="x" class="w-4 h-4"></app-icon> Clear
      </button>
    </div>
    <div class="flex-1 p-4 overflow-auto text-sm font-mono text-green-600 bg-olive-parchment">
      <pre>{{ formatJson(selectedTemplate()!.content) }}</pre>
    </div>
  </div>
  }
</div>
