<div class="flex flex-col gap-6 p-4 sm:p-6">
  <div>
    <h2 class="text-2xl font-bold text-olive-deep sm:text-3xl">% Change</h2>
    <p class="text-sm text-olive-ink/70">Calculate the percentage increase or decrease between two values.</p>
  </div>

  <div
    class="flex flex-wrap items-end gap-4 rounded border border-olive-border bg-olive-cream p-4 text-olive-deep"
  >
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-olive-ink">From</label>
      <input
        type="number"
        [value]="x()"
        (input)="onXChange(+$any($event.target).value)"
        placeholder="Original"
        class="w-32 rounded-md border border-olive-border bg-parchment px-3 py-2 text-sm text-black transition-colors focus:border-posthog-orange focus:outline-none focus:ring-2 focus:ring-posthog-orange/30"
      />
    </div>
    <span class="pb-2 text-olive-ink">to</span>
    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold text-olive-ink">To</label>
      <input
        type="number"
        [value]="y()"
        (input)="onYChange(+$any($event.target).value)"
        placeholder="New"
        class="w-32 rounded-md border border-olive-border bg-parchment px-3 py-2 text-sm text-black transition-colors focus:border-posthog-orange focus:outline-none focus:ring-2 focus:ring-posthog-orange/30"
      />
    </div>
  </div>

  <div
    class="flex flex-col items-center justify-center rounded border border-olive-border bg-parchment p-6"
  >
    <p class="mb-2 text-sm font-semibold text-olive-ink">Result</p>
    <p class="text-xl font-bold text-olive-deep sm:text-2xl">{{ result() | number: '1.2-2' }}%</p>
    @if (x() || y()) {
      <span
        class="mt-2 text-sm font-semibold uppercase"
        [class]="result() > 0 ? 'text-green-600' : result() < 0 ? 'text-red-600' : 'text-olive-ink'"
      >{{ changeLabel() }}</span>
    }
  </div>
</div>
