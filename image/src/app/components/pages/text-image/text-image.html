<div class="card">
  <div>
    <h2 class="section-heading">Base64 → Image</h2>
    <p class="section-subtitle">Pega el texto Base64 y obtén una vista previa de la imagen.</p>
  </div>

  <div class="flex flex-col gap-4 mt-3">
    <label class="label">Base64 Input</label>
    <app-input-box
      [value]="base64Input"
      (valueChange)="base64Input = $event"
      [rows]="8"
      placeholder="Pega tu Base64 aquí..."
      inputClass="input-field rounded resize-none max-h-64 overflow-auto"
    />

    <div class="flex items-center gap-3">
      <label class="label">Output format</label>
      <select [(ngModel)]="outputFormat" class="select-field">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WEBP</option>
        <option value="bmp">BMP</option>
      </select>
    </div>

    <div class="flex flex-wrap gap-2">
      <button (click)="convert()" [disabled]="loading" class="btn-primary">
        @if (loading) {
          <fa-icon [icon]="['fas', 'spinner']" class="w-4 h-4 animate-spin"></fa-icon> Procesando...
        } @else {
          <fa-icon [icon]="['fas', 'image']" class="w-4 h-4"></fa-icon> Convertir
        }
      </button>
      <button (click)="clear()" class="btn-ghost">
        <fa-icon [icon]="['fas', 'trash']" class="w-4 h-4"></fa-icon> Limpiar
      </button>
      @if (resultImageDataUrl) {
        <button (click)="download()" class="btn-primary">
          <fa-icon [icon]="['fas', 'download']" class="w-4 h-4"></fa-icon> Descargar
        </button>
      }
    </div>

    @if (hasError) {
      <p class="error-message">
        <fa-icon [icon]="['fas', 'circle-exclamation']" class="w-4 h-4"></fa-icon>
        <span>{{ errorMessage }}</span>
      </p>
    }

    @if (resultImageDataUrl) {
      <div class="mt-4">
        <h3 class="label">Preview</h3>
        <div class="preview-container">
          <img [src]="resultImageDataUrl" alt="result" class="object-contain max-w-full max-h-80" />
        </div>
      </div>
    }
  </div>
</div>
